appId: app.orkestra.desktop
productName: Orkestra
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# node-pty no Unix (macOS/Linux) lança um binário auxiliar `spawn-helper` via posix_spawnp para
# criar o pty. Um executável DENTRO do app.asar NÃO pode ser lançado → "posix_spawnp failed" e o
# terminal não abre em produção (em dev funciona, pois roda do node_modules sem asar). O
# smartUnpack do electron-builder desempacota só o pty.node (.node), NÃO o spawn-helper — por
# isso desempacotamos o node-pty inteiro para app.asar.unpacked/, preservando o +x do helper.
asarUnpack:
  - '**/node_modules/node-pty/**'
# npmRebuild: false — node-pty 1.1.0 é N-API (node-addon-api + node-gyp-build), então seus
# binários pré-compilados são ABI-estáveis e rodam no Electron SEM recompilar. Evita o node-gyp
# no CI (Visual Studio no Windows / distutils no macOS), que quebrava o Release. O smartUnpack
# do electron-builder continua desempacotando o .node do asar normalmente.
npmRebuild: false
# build/icon.png (1024x1024, exportado de resources/icon.svg) — electron-builder deriva
# o .icns (mac) e .ico (win) a partir dele automaticamente.
icon: build/icon.png
# UM arquivo por dispositivo: .dmg (mac), .exe (win), .AppImage (linux). A atualização
# NÃO usa o auto-update binário do electron-updater (que no macOS exigiria também um .zip);
# em vez disso, src/main/updater.ts consulta a última release no GitHub e abre a página de
# download quando há versão nova — então um único instalador por SO basta.
mac:
  target:
    - target: dmg
      arch: x64
  category: public.app-category.developer-tools
  # identity: null → build NÃO-assinado (assinatura ad-hoc simples). Sem certificado Apple não
  # há como assinar/notarizar de verdade, e o combo "assinatura ad-hoc + hardenedRuntime" quebra
  # nos runners macOS Sequoia com "⨯ ... not a file". Por isso NÃO usamos hardenedRuntime nem
  # entitlements (só fariam sentido com notarização). O app roda com o aviso do Gatekeeper, que
  # o usuário contorna (botão direito → Abrir). Para assinar de verdade no futuro: adicionar os
  # secrets CSC_LINK/CSC_KEY_PASSWORD, trocar identity p/ o nome do certificado e reativar
  # hardenedRuntime + entitlements + notarização.
  identity: null
  gatekeeperAssess: false
  # NOTA: arch e x64 (roda em Apple Silicon via Rosetta 2). arm64 nativo/universal e um
  # upgrade futuro — precisa validar o empacotamento do node-pty (nativo) por arch.
win:
  target:
    - target: nsis
linux:
  target:
    - target: AppImage
  category: Development
publish:
  provider: github
  owner: felipeabreu2
  repo: orkestra
