appId: app.orkestra.desktop
productName: Orkestra
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# npmRebuild: false — node-pty 1.1.0 é N-API (node-addon-api + node-gyp-build), então seus
# binários pré-compilados são ABI-estáveis e rodam no Electron SEM recompilar. Evita o node-gyp
# no CI (Visual Studio no Windows / distutils no macOS), que quebrava o Release. O smartUnpack
# do electron-builder continua desempacotando o .node do asar normalmente.
npmRebuild: false
# build/icon.png (1024x1024, exportado de resources/icon.svg) — electron-builder deriva
# o .icns (mac) e .ico (win) a partir dele automaticamente.
icon: build/icon.png
# UM arquivo por dispositivo: .dmg (mac), .exe (win), .AppImage (linux). A atualização
# NÃO usa o auto-update binário do electron-updater (que no macOS exigiria também um .zip);
# em vez disso, src/main/updater.ts consulta a última release no GitHub e abre a página de
# download quando há versão nova — então um único instalador por SO basta.
mac:
  target:
    - target: dmg
      arch: x64
  category: public.app-category.developer-tools
  # Assinatura + notarizacao ativam AUTOMATICAMENTE quando as variaveis de ambiente estao
  # presentes (CSC_LINK/CSC_KEY_PASSWORD p/ assinar; APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
  # APPLE_TEAM_ID p/ notarizar). hardenedRuntime + entitlements sao exigidos pela notarizacao.
  # Sem as variaveis, o build sai NAO-assinado (Gatekeeper avisa) mas funciona.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # NOTA: arch e x64 (roda em Apple Silicon via Rosetta 2). arm64 nativo/universal e um
  # upgrade futuro — precisa validar o empacotamento do node-pty (nativo) por arch.
win:
  target:
    - target: nsis
linux:
  target:
    - target: AppImage
  category: Development
publish:
  provider: github
  owner: felipeabreu2
  repo: orkestra
