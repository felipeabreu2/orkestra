<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!--
    Orkestra app mark (Fase 13). Original artwork — not derived from any existing product's logo.

    Concept: one bright "hub" node conducting five dimmer "agent" nodes arranged on a ring — a
    literal orchestra conductor + performers, and a visual pun on the app's job (a canvas that
    orchestrates AI coding agents). The ring the five nodes sit on also reads as an abstract "O"
    (Orkestra). Kept to a handful of solid shapes (no fine hairlines/text) so it still reads as
    a coherent badge at very small sizes (favicon, 20px inline wordmark), not just at 1024px.

    Palette: dark rounded-square backdrop + the app's accent violet (#7c6cff, the `accent`
    custom property in src/renderer/src/styles/tokens.css) in two tints (dim for structure,
    bright for the hub) — the same "dark premium, one accent used sparingly" language as the
    rest of the Fase 13 UI.
  -->
  <defs>
    <linearGradient id="okBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161329" />
      <stop offset="1" stop-color="#08070d" />
    </linearGradient>
    <radialGradient id="okGlow" cx="256" cy="256" r="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c6cff" stop-opacity="0.55" />
      <stop offset="1" stop-color="#7c6cff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="okHub" x1="228" y1="228" x2="284" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#cfc6ff" />
    </linearGradient>
  </defs>

  <!-- backdrop: dark rounded square, app-icon-ready -->
  <rect width="512" height="512" rx="112" fill="url(#okBg)" />

  <!-- soft glow behind the hub -->
  <circle cx="256" cy="256" r="150" fill="url(#okGlow)" />

  <!-- orbit ring passing through the five agent nodes (the abstract "O") -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#7c6cff" stroke-opacity="0.38" stroke-width="6" />

  <!-- spokes: hub conducting each agent node -->
  <g stroke="#9d8fff" stroke-opacity="0.55" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="126" />
    <line x1="256" y1="256" x2="380" y2="216" />
    <line x1="256" y1="256" x2="332" y2="361" />
    <line x1="256" y1="256" x2="180" y2="361" />
    <line x1="256" y1="256" x2="132" y2="216" />
  </g>

  <!-- five agent nodes -->
  <g fill="#b3a8ff">
    <circle cx="256" cy="126" r="22" />
    <circle cx="380" cy="216" r="22" />
    <circle cx="332" cy="361" r="22" />
    <circle cx="180" cy="361" r="22" />
    <circle cx="132" cy="216" r="22" />
  </g>

  <!-- the hub: the conductor -->
  <circle cx="256" cy="256" r="34" fill="url(#okHub)" />
</svg>
