<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Novo Terminal — redesign (mockup)</title>
    <style>
      /* ============================================================================
         TOKENS — copiados verbatim de src/renderer/src/styles/tokens.css
         :root = ESCURO (padrão) · :root[data-theme='light'] = CLARO
         ============================================================================ */
      @property --beam {
        syntax: '<angle>';
        inherits: false;
        initial-value: 0deg;
      }

      :root {
        /* superfícies */
        --bg-0: #0a0a0f;
        --bg-1: #16171d;
        --bg-2: #1f2027;
        --bg-3: #292b33;
        --bg-2-weak: rgba(255, 255, 255, 0.04);
        /* bordas & hairlines */
        --border: rgba(255, 255, 255, 0.09);
        --border-strong: rgba(255, 255, 255, 0.16);
        --hairline: rgba(255, 255, 255, 0.08);
        --hairline-glass: inset 0 0.5px 0 rgba(255, 255, 255, 0.14);
        /* texto */
        --text-1: #f4f6fa;
        --text-2: rgba(244, 246, 250, 0.62);
        --text-3: rgba(244, 246, 250, 0.4);
        --label: rgba(255, 255, 255, 0.92);
        --label-2: rgba(235, 235, 245, 0.6);
        --label-3: rgba(235, 235, 245, 0.3);
        /* accent — AZUL (blue-400 no dark) */
        --accent: #3395ff;
        --accent-hover: #4aa3ff;
        --accent-weak: rgba(51, 149, 255, 0.18);
        --accent-text: #ffffff;
        --gradient-brand: linear-gradient(135deg, #3395ff 0%, #5856d6 100%);
        --gradient-accent: linear-gradient(180deg, #3395ff 0%, #007aff 100%);
        /* estados */
        --ok: #34c759;
        --ok-weak: rgba(52, 199, 89, 0.16);
        --warn: #ff9500;
        --warn-weak: rgba(255, 149, 0, 0.16);
        --err: #ff453a;
        --err-weak: rgba(255, 69, 58, 0.16);
        --danger: var(--err);
        --attention: #ff453a;
        --attention-ring: rgba(255, 69, 58, 0.5);
        /* accents de papel */
        --paper-blue: #0a84ff;
        --paper-green: #34c759;
        --paper-orange: #ff9500;
        --paper-red: #ff453a;
        --paper-indigo: #5e5ce6;
        --paper-purple: #bf5af2;
        --paper-teal: #40c8e0;
        --paper-pink: #ff375f;
        --paper-cyan: #64d2ff;
        --paper-yellow: #ffd60a;
        /* materiais / vidro */
        --glass-1: rgba(22, 23, 29, 0.7);
        --glass-2: rgba(23, 24, 30, 0.9);
        --glass-3: rgba(23, 24, 30, 0.92);
        --glass-border: rgba(255, 255, 255, 0.09);
        --material-thin: saturate(180%) blur(20px);
        --material-regular: saturate(180%) blur(24px);
        --material-thick: saturate(180%) blur(30px);
        --material-chrome: saturate(160%) blur(22px);
        --scrim: rgba(0, 0, 0, 0.55);
        /* sombras */
        --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.5), 0 10px 26px rgba(0, 0, 0, 0.5);
        --shadow-2: 0 8px 24px rgba(0, 0, 0, 0.55);
        --shadow-3: 0 16px 40px rgba(0, 0, 0, 0.6), 0 4px 12px rgba(0, 0, 0, 0.5);
        --ring-focus: 0 0 0 4px var(--accent-weak);
        --ring-avatar: 0 0 0 2px var(--bg-0);

        /* FORMA · raios */
        --radius-sm: 10px;
        --radius: 12px;
        --radius-lg: 16px;
        --radius-node: 14px;
        --radius-note: 12px;
        --radius-pill: 9999px;
        --radius-circle: 50%;

        /* TIPOGRAFIA · famílias */
        --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace;

        /* TIPOGRAFIA · escala */
        --fs-micro: 9px;
        --fs-2xs: 10px;
        --fs-xs: 11px;
        --fs-sm: 12px;
        --fs-base: 13px;
        --fs-md: 14px;
        --fs-lg: 15px;
        --fs-xl: 17px;
        --fs-2xl: 20px;
        --fs-3xl: 24px;

        --tracking-tight: -0.02em;
        --tracking-tighter: -0.03em;
        --tracking-normal: 0;
        --tracking-label: 0.06em;
        --weight-regular: 400;
        --weight-medium: 500;
        --weight-semibold: 600;
        --weight-bold: 700;
        --lh-tight: 1.2;
        --lh-snug: 1.25;
        --lh-ui: 1;
        --lh-normal: 1.5;

        /* ESPAÇAMENTO · grid 4px */
        --space-0-5: 2px;
        --space-1: 4px;
        --space-1-5: 6px;
        --space-2: 8px;
        --space-2-5: 10px;
        --space-3: 12px;
        --space-3-5: 14px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --space-canvas-grid: 22px;

        /* MOTION · durações + curvas */
        --dur-1: 130ms;
        --dur-2: 220ms;
        --dur-3: 320ms;
        --ease: cubic-bezier(0.2, 0.6, 0.2, 1);
        --ease-out: cubic-bezier(0, 0, 0.58, 1);
        --ease-in: cubic-bezier(0.42, 0, 1, 1);
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --press-scale: 0.965;
      }

      /* TEMA CLARO · sobrecarga */
      :root[data-theme='light'] {
        --bg-0: #edf0f5;
        --bg-1: #ffffff;
        --bg-2: #f4f5f8;
        --bg-3: #e9ebf0;
        --bg-2-weak: rgba(11, 11, 15, 0.04);
        --border: rgba(11, 11, 15, 0.08);
        --border-strong: rgba(11, 11, 15, 0.14);
        --hairline: rgba(11, 11, 15, 0.06);
        --hairline-glass: inset 0 0.5px 0 rgba(255, 255, 255, 0.7);
        --text-1: #0b0b0f;
        --text-2: rgba(11, 11, 15, 0.6);
        --text-3: rgba(11, 11, 15, 0.42);
        --label: rgba(0, 0, 0, 0.88);
        --label-2: rgba(60, 60, 67, 0.6);
        --label-3: rgba(60, 60, 67, 0.3);
        --accent: #007aff;
        --accent-hover: #0069e0;
        --accent-weak: rgba(0, 122, 255, 0.12);
        --accent-text: #ffffff;
        --gradient-brand: linear-gradient(135deg, #3395ff 0%, #5856d6 100%);
        --gradient-accent: linear-gradient(180deg, #3395ff 0%, #007aff 100%);
        --ok: #248a3d;
        --ok-weak: rgba(52, 199, 89, 0.14);
        --warn: #b45a09;
        --warn-weak: rgba(255, 149, 0, 0.14);
        --err: #d70015;
        --err-weak: rgba(255, 59, 48, 0.12);
        --danger: var(--err);
        --attention: #ff3b30;
        --attention-ring: rgba(255, 59, 48, 0.5);
        /* accents de papel: idênticos ao dark (hues de tag) — repetidos para o mockup ser fiel */
        --paper-blue: #0a84ff;
        --paper-green: #34c759;
        --paper-orange: #ff9500;
        --paper-red: #ff453a;
        --paper-indigo: #5e5ce6;
        --paper-purple: #bf5af2;
        --paper-teal: #40c8e0;
        --paper-pink: #ff375f;
        --paper-cyan: #64d2ff;
        --paper-yellow: #ffd60a;
        --glass-1: rgba(255, 255, 255, 0.72);
        --glass-2: rgba(255, 255, 255, 0.86);
        --glass-3: rgba(255, 255, 255, 0.94);
        --glass-border: rgba(11, 11, 15, 0.08);
        --scrim: rgba(11, 11, 15, 0.3);
        --shadow-1: 0 1px 2px rgba(11, 11, 15, 0.05), 0 10px 26px rgba(11, 11, 15, 0.09);
        --shadow-2: 0 10px 30px rgba(11, 11, 15, 0.14);
        --shadow-3: 0 16px 48px rgba(11, 11, 15, 0.2), 0 4px 12px rgba(11, 11, 15, 0.1);
      }

      /* ============================================================================
         KEYFRAMES — copiados de src/renderer/src/styles/motion.css
         ============================================================================ */
      @keyframes ork-fade-in {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes ork-scale-in {
        from {
          opacity: 0;
          transform: scale(0.98);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes ork-shimmer {
        0% {
          transform: translateX(-130%) skewX(-18deg);
        }
        55%,
        100% {
          transform: translateX(360%) skewX(-18deg);
        }
      }

      /* ============================================================================
         BASE do mockup (reset mínimo + página)
         ============================================================================ */
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-ui);
        background: var(--bg-0);
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
      }
      .stage {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        gap: var(--space-8);
        padding: var(--space-8) var(--space-6) 80px;
      }
      .stage-col {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        align-items: center;
      }
      .stage-caption {
        font-size: var(--fs-sm);
        color: var(--text-2);
        letter-spacing: var(--tracking-label);
        text-transform: uppercase;
      }
      /* Botão fixo "Alternar tema" */
      .theme-toggle {
        position: fixed;
        top: var(--space-4);
        right: var(--space-4);
        z-index: 2000;
        padding: var(--space-2) var(--space-3-5);
        font-family: var(--font-ui);
        font-size: var(--fs-sm);
        font-weight: var(--weight-medium);
        color: var(--text-1);
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        cursor: pointer;
      }
      .theme-toggle:hover {
        border-color: var(--border-strong);
      }
      /* Ícones-placeholder herdam a cor do container (currentColor). */
      .ico {
        display: inline-flex;
      }
      .ico svg {
        display: block;
      }

      /* ============================================================================
         CSS DO MODAL — copiado verbatim de
         src/renderer/src/components/NewTerminalModal.css
         (sem .ork-modal-backdrop position:fixed — no mockup os cards vivem no fluxo)
         ============================================================================ */
      .ork-modal-card {
        background: var(--glass-3);
        backdrop-filter: var(--material-thick);
        -webkit-backdrop-filter: var(--material-thick);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-3), var(--hairline-glass);
        color: var(--label);
        isolation: isolate;
        animation: ork-scale-in var(--dur-2) var(--ease);
      }

      .ork-newterm {
        width: 420px;
        max-width: 100%;
        padding: 0;
        display: flex;
        flex-direction: column;
      }

      .ork-newterm-head {
        display: flex;
        align-items: center;
        gap: var(--space-2-5);
        padding: var(--space-3-5) var(--space-4);
        border-bottom: 1px solid var(--glass-border);
      }
      .ork-newterm-head-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border-radius: var(--radius-sm);
        background: var(--gradient-brand);
        color: var(--accent-text);
        box-shadow: 0 3px 8px var(--accent-weak);
      }
      .ork-newterm-head-title {
        flex: 1;
        margin: 0;
        font-size: var(--fs-lg);
        font-weight: var(--weight-semibold);
        letter-spacing: var(--tracking-tight);
        color: var(--label);
      }
      .ork-newterm-close {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        padding: 0;
        color: var(--label-3);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition:
          background var(--dur-1) var(--ease),
          color var(--dur-1) var(--ease);
      }
      .ork-newterm-close:hover {
        background: var(--bg-2-weak);
        color: var(--label);
      }

      .ork-newterm-content {
        padding: var(--space-4) var(--space-5);
        display: flex;
        flex-direction: column;
      }

      .ork-newterm-quickstart-label {
        text-align: center;
        font-size: var(--fs-xs);
        color: var(--label-2);
        margin-bottom: var(--space-2);
      }

      .ork-newterm-presets {
        display: flex;
        gap: var(--space-2);
        justify-content: center;
      }

      .ork-newterm-preset {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-1-5);
        padding: var(--space-3) var(--space-2);
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-2);
        cursor: pointer;
        transition:
          border-color var(--dur-1) var(--ease),
          background var(--dur-1) var(--ease),
          color var(--dur-1) var(--ease),
          transform var(--dur-1) var(--ease);
      }
      .ork-newterm-preset:hover {
        border-color: var(--border-strong);
        color: var(--text-1);
      }
      .ork-newterm-preset:active {
        transform: scale(var(--press-scale));
      }
      .ork-newterm-preset--active {
        border-color: var(--accent);
        background: var(--accent-weak);
        color: var(--accent);
      }
      .ork-newterm-preset-label {
        font-size: var(--fs-xs);
        text-align: center;
        line-height: var(--lh-tight);
      }

      .ork-newterm-divider {
        height: 1px;
        background: var(--glass-border);
        margin: var(--space-4) 0;
      }
      .ork-newterm-divider--tight {
        margin: var(--space-1) 0 var(--space-2);
      }

      .ork-newterm-tabs {
        display: inline-flex;
        align-self: center;
        gap: var(--space-0-5);
        padding: var(--space-0-5);
        background: var(--bg-2);
        border-radius: var(--radius-pill);
        margin-bottom: var(--space-3-5);
      }
      .ork-newterm-tab {
        padding: var(--space-1) var(--space-4);
        font-size: var(--fs-sm);
        color: var(--text-2);
        background: transparent;
        border: none;
        border-radius: var(--radius-pill);
        cursor: pointer;
        font-family: var(--font-ui);
        transition:
          background var(--dur-1) var(--ease),
          color var(--dur-1) var(--ease);
      }
      .ork-newterm-tab:hover {
        color: var(--text-1);
      }
      .ork-newterm-tab--active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .ork-newterm-body {
        display: flex;
        flex-direction: column;
        gap: var(--space-2-5);
        min-height: 176px;
        animation: ork-fade-in var(--dur-2) var(--ease);
      }

      .ork-newterm-name {
        width: 100%;
        padding: var(--space-2) var(--space-2-5);
        font-size: var(--fs-base);
        font-family: var(--font-ui);
        color: var(--text-1);
        background: var(--bg-2);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        outline: none;
        box-shadow: 0 0 0 0 transparent;
        transition:
          border-color var(--dur-1) var(--ease),
          box-shadow var(--dur-2) var(--spring);
      }
      .ork-newterm-name:focus {
        border-color: var(--accent);
        box-shadow: var(--ring-focus);
      }
      .ork-newterm-name::placeholder {
        color: var(--text-3);
      }

      .ork-newterm-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        font-size: var(--fs-sm);
      }
      .ork-newterm-field-label {
        color: var(--label-2);
        font-size: var(--fs-sm);
      }
      .ork-newterm-field-value {
        font-family: var(--font-mono);
        font-size: var(--fs-sm);
        color: var(--text-1);
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 2px var(--space-2);
      }

      .ork-newterm-options {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }
      .ork-newterm-option {
        display: flex;
        align-items: flex-start;
        gap: var(--space-2-5);
        cursor: pointer;
      }
      .ork-newterm-option input {
        flex: 0 0 auto;
        margin-top: 2px;
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
      }
      .ork-newterm-option-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .ork-newterm-option-title {
        font-size: var(--fs-base);
        font-weight: var(--weight-medium);
        color: var(--label);
      }
      .ork-newterm-option-desc {
        font-size: var(--fs-xs);
        line-height: var(--lh-snug);
        color: var(--text-2);
      }

      .ork-newterm-roles {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-1-5);
      }
      .ork-newterm-role {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1-5);
        height: 28px;
        padding: 0 var(--space-2-5);
        font-size: var(--fs-xs);
        font-weight: var(--weight-medium);
        font-family: var(--font-ui);
        white-space: nowrap;
        color: var(--text-2);
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        cursor: pointer;
        transition:
          border-color var(--dur-1) var(--ease),
          background var(--dur-1) var(--ease),
          color var(--dur-1) var(--ease),
          transform var(--dur-1) var(--ease);
      }
      .ork-newterm-role:hover {
        border-color: var(--border-strong);
        color: var(--text-1);
      }
      .ork-newterm-role:active {
        transform: scale(var(--press-scale));
      }
      .ork-newterm-role--active {
        color: var(--role-color, var(--accent));
        border-color: var(--role-color, var(--accent));
        background: color-mix(in srgb, var(--role-color, var(--accent)) 16%, transparent);
      }
      .ork-newterm-role-dot {
        flex: 0 0 auto;
        width: 7px;
        height: 7px;
        border-radius: var(--radius-circle);
      }
      .ork-newterm-role-hint {
        margin: 0;
        min-height: 30px;
        font-size: var(--fs-xs);
        line-height: var(--lh-snug);
        color: var(--text-2);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .ork-newterm-discover {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-1-5);
        width: 100%;
        margin-top: auto;
      }

      .ork-newterm-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--space-2);
        padding: var(--space-3-5) var(--space-5) var(--space-5);
        border-top: 1px solid var(--glass-border);
      }

      .ork-btn {
        padding: var(--space-1-5) var(--space-4);
        font-size: var(--fs-base);
        font-weight: var(--weight-medium);
        font-family: var(--font-ui);
        border-radius: var(--radius-pill);
        border: 1px solid transparent;
        cursor: pointer;
        transition:
          filter var(--dur-1) var(--ease),
          background var(--dur-1) var(--ease),
          border-color var(--dur-1) var(--ease),
          transform var(--dur-1) var(--ease);
      }
      .ork-btn:active {
        transform: scale(var(--press-scale));
      }
      .ork-btn--ghost {
        color: var(--text-1);
        background: var(--bg-2);
        border-color: var(--border);
      }
      .ork-btn--ghost:hover {
        border-color: var(--border-strong);
      }
      .ork-btn--primary {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: var(--space-1-5);
        overflow: hidden;
        color: var(--accent-text);
        background: var(--gradient-accent);
        box-shadow:
          0 6px 16px var(--accent-weak),
          var(--hairline-glass);
      }
      .ork-btn--primary:hover {
        filter: brightness(1.08);
        box-shadow:
          0 10px 24px var(--accent-weak),
          var(--hairline-glass);
      }
      .ork-btn--primary:focus-visible {
        outline: none;
        box-shadow: var(--ring-focus);
      }
      .ork-btn--primary::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 20%,
          color-mix(in srgb, var(--accent-text) 55%, transparent) 42%,
          transparent 60%
        );
        transform: translateX(-130%) skewX(-18deg);
        animation: ork-shimmer 3.8s ease-in-out infinite;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .ork-btn--primary::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" type="button">Alternar tema</button>

    <div class="stage">
      <!-- ================= CARD 1 — aba DETALHES ================= -->
      <div class="stage-col">
        <div class="stage-caption">Aba · Detalhes</div>
        <div class="ork-modal-card ork-newterm" role="dialog" aria-modal="true" aria-label="Novo Terminal">
          <div class="ork-newterm-head">
            <span class="ork-newterm-head-icon" aria-hidden="true">
              <span class="ico" data-ico="terminal" data-size="14"></span>
            </span>

      const root = document.documentElement
      document.getElementById('themeToggle').addEventListener('click', () => {
        root.dataset.theme = root.dataset.theme === 'light' ? '' : 'light'
      })

      // Ícones-placeholder: SVGs genéricos inline (o Lucide não existe no HTML puro — o foco do
      // mockup é layout/cor/forma, não o glifo exato). Herdam currentColor.
      const ICONS = {
        terminal:
          '<rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 9 3 3-3 3"/><path d="M13 15h4"/>',
        sparkles:
          '<path d="M12 3l1.6 5.4L19 10l-5.4 1.6L12 17l-1.6-5.4L5 10l5.4-1.6z"/><path d="M18 15l.7 2.3L21 18l-2.3.7L18 21l-.7-2.3L15 18l2.3-.7z"/>',
        code: '<polyline points="9 8 5 12 9 16"/><polyline points="15 8 19 12 15 16"/>',
        gem: '<path d="M6 4h12l3 5-9 11L3 9z"/><path d="M3 9h18"/><path d="M9 4 7 9l5 11 5-11-2-5"/>',
        x: '<path d="M6 6 18 18M18 6 6 18"/>',
        plus: '<path d="M12 5v14M5 12h14"/>',
        search: '<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>'
      }
      document.querySelectorAll('.ico[data-ico]').forEach((el) => {
        const key = el.dataset.ico
        const size = el.dataset.size || 16
        el.innerHTML =
          '<svg width="' +
          size +
          '" height="' +
          size +
          '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
          'stroke-linecap="round" stroke-linejoin="round">' +
          (ICONS[key] || '') +
          '</svg>'
      })
