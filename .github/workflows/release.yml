name: Release

# Dispara ao empurrar uma tag de versão (ex.: git tag v1.0.0 && git push origin v1.0.0).
# Cada SO empacota os instaladores da sua própria plataforma e os publica no
# GitHub Release da tag (via electron-builder --publish always → npm run release).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # necessário para o electron-builder criar/atualizar o Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp (recompila o node-pty para o ABI do Electron) precisa de distutils, removido
      # no Python 3.12+ dos runners. Fixar 3.11 (que ainda traz distutils) faz o rebuild passar.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: npm ci

      # HOTFIX v1.2.1 — regressão de arquitetura: o runner `macos-latest` migrou para Apple Silicon
      # (macos-26-arm64), então `npm ci` roda com node arm64 e o install do node-pty (scripts/
      # prebuild.js) copia o prebuild do arch do HOST → build/Release fica ARM64. Mas o app é
      # empacotado x64 (electron-builder.yml → mac.target.arch: x64) e npmRebuild:false não recompila.
      # Resultado: spawn-helper arm64 dentro de um app x64 → "posix_spawnp failed" no terminal em
      # produção (Intel nativamente, e Apple Silicon via Rosetta). node-pty JÁ traz prebuilds/
      # darwin-x64 — então forçamos build/Release para x64 (o 1º dir que node-pty tenta em
      # lib/utils.js). Só macOS; casado com mac.target.arch: x64 no electron-builder.yml.
      - name: Casar node-pty (nativo) com o alvo x64 do app
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          NP=node_modules/node-pty/build/Release
          cp -f node_modules/node-pty/prebuilds/darwin-x64/pty.node "$NP/pty.node"
          cp -f node_modules/node-pty/prebuilds/darwin-x64/spawn-helper "$NP/spawn-helper"
          chmod +x "$NP/spawn-helper"
          echo "verificação (deve ser x86_64):"
          file "$NP/spawn-helper" "$NP/pty.node"
          file "$NP/spawn-helper" | grep -q x86_64 || { echo "ERRO: spawn-helper não é x86_64"; exit 1; }

      - name: Empacotar e publicar
        run: npm run release
        env:
          # Token automático do Actions — permissão de escrita em Releases (ver `permissions` acima)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NÃO definimos CSC_IDENTITY_AUTO_DISCOVERY: deixamos o default do electron-builder.
          # Foi assim que a v1.0.0 gerou o .dmg com sucesso. Forçar =false (sem cert) fazia o
          # macOS Sequoia dos runners quebrar a assinatura ad-hoc com "⨯ ... not a file". Quando
          # houver certificado (CSC_LINK preenchido abaixo), o electron-builder assina normalmente.
          # Assinatura + notarização macOS — configurar em Settings → Secrets and variables → Actions.
          # Ausentes, o build macOS sai não-assinado (funciona; Gatekeeper avisa).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
